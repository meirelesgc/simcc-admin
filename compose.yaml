services:
  db:
    image: pgvector/pgvector:pg17
    env_file:
      - .env
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  cache:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - cache:/data
    restart: unless-stopped

  api:
    image: jade-admin-api
    ports:
      - "8000:8000"
    depends_on:
      - cache
    restart: unless-stopped
    volumes:
      - .:/app

volumes:
  cache:
